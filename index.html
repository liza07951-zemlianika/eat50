<html lang="ru">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Plural">

<title>Plural</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #f2f4f0; color: #1a1a1a; min-height: 100vh; }
.app { max-width: 480px; margin: 0 auto; padding: 16px 16px 48px; }

/* NAME SCREEN */
.name-screen { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 32px 24px; text-align: center; }
.name-screen h2 { font-size: 24px; font-weight: 600; margin-bottom: 8px; }
.name-screen p { font-size: 14px; color: #888; margin-bottom: 28px; line-height: 1.5; }
.name-input { width: 100%; padding: 14px 16px; border: 1px solid #e0e0e0; border-radius: 12px; font-size: 17px; outline: none; background: #fff; margin-bottom: 12px; }
.name-input:focus { border-color: #4caf6e; }
.name-btn { width: 100%; padding: 14px; background: #2d7a3a; color: #fff; border: none; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; }

.header { padding: 20px 0 4px; }
.header-top { display: flex; align-items: center; justify-content: space-between; }
.header h1 { font-size: 21px; font-weight: 600; flex: 1; text-align: center; }
.header-name { font-size: 13px; color: #888; margin-top: 4px; cursor: pointer; text-align: center; }
.header-name:hover { color: #2d7a3a; }
.share-btn { background: #f0f9f2; border: 1px solid #c8e6c9; border-radius: 10px; padding: 7px 12px; font-size: 13px; color: #2d7a3a; cursor: pointer; font-weight: 500; white-space: nowrap; flex-shrink: 0; }

.card { background: #fff; border-radius: 16px; padding: 16px 18px; margin: 12px 0; }
.slabel { font-size: 11px; color: #aaa; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 12px; }
.counter { font-size: 50px; font-weight: 700; color: #2d7a3a; text-align: center; line-height: 1; }
.counter span { font-size: 22px; color: #bbb; font-weight: 400; }
.bar-wrap { margin: 14px 0 6px; background: #eee; border-radius: 99px; height: 10px; overflow: hidden; }
.bar { height: 100%; background: #4caf6e; border-radius: 99px; transition: width 0.4s; }
.week-label { font-size: 12px; color: #bbb; text-align: center; }
.success { background: #e8f5ee; border-radius: 10px; padding: 10px 14px; margin-top: 12px; font-size: 14px; color: #2d7a3a; font-weight: 500; text-align: center; display: none; }

.rainbow-bar-wrap { height: 26px; border-radius: 8px; overflow: hidden; display: flex; margin: 10px 0 10px; background: #f0f0ee; }
.rainbow-seg { height: 100%; transition: width 0.4s; }
.rainbow-legend { display: flex; flex-wrap: wrap; gap: 5px 10px; }
.rleg { display: flex; align-items: center; gap: 4px; font-size: 11px; color: #555; }
.rleg-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.rleg.off { opacity: 0.3; }

.dyn-chart { display: flex; align-items: flex-end; gap: 5px; height: 72px; margin-top: 10px; }
.dyn-col { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; height: 100%; justify-content: flex-end; }
.dyn-bar { width: 100%; border-radius: 4px 4px 0 0; background: #c8e6c9; min-height: 2px; }
.dyn-bar.cur { background: #4caf6e; }
.dyn-bar.fiber { background: #ffe082; }
.dyn-bar.fiber.cur { background: #ffb300; }
.dyn-num { font-size: 11px; font-weight: 600; color: #666; }
.dyn-lbl { font-size: 10px; color: #bbb; }

.fiber-big { font-size: 38px; font-weight: 700; color: #e65100; line-height: 1; }
.fiber-unit { font-size: 15px; color: #aaa; }

.cat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin: 12px 0; }
.cat-card { background: #fff; border-radius: 12px; padding: 11px 13px; }
.cat-icon { font-size: 16px; margin-bottom: 2px; }
.cat-name { font-size: 11px; color: #aaa; }
.cat-count { font-size: 21px; font-weight: 600; margin-top: 1px; }

.cat-tabs { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; }
.cat-tab { padding: 5px 11px; border-radius: 99px; border: 1px solid #e0e0e0; background: #f7f7f5; font-size: 12px; cursor: pointer; color: #555; }
.cat-tab.active { background: #2d7a3a; color: #fff; border-color: #2d7a3a; }
.chips { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 14px; }
.chip { padding: 6px 12px; background: #f0f9f2; border: 1px solid #c8e6c9; border-radius: 99px; font-size: 13px; cursor: pointer; color: #2d7a3a; }
.chip:active { background: #2d7a3a; color: #fff; }

.add-row { display: flex; gap: 8px; align-items: center; }
.food-inp { flex: 1; padding: 10px 13px; border: 1px solid #e0e0e0; border-radius: 10px; font-size: 15px; outline: none; background: #fafafa; min-width: 0; }
.food-inp:focus { border-color: #4caf6e; background: #fff; }
.gram-inp { width: 68px; padding: 10px 8px; border: 1px solid #e0e0e0; border-radius: 10px; font-size: 14px; outline: none; background: #fafafa; text-align: center; color: #555; flex-shrink: 0; }
.gram-inp:focus { border-color: #ffb300; background: #fff; }
.add-btn { padding: 10px 16px; background: #2d7a3a; color: #fff; border: none; border-radius: 10px; font-size: 16px; font-weight: 500; cursor: pointer; flex-shrink: 0; }
.gram-hint { font-size: 11px; color: #bbb; margin-top: 6px; }

.freq-item { display: flex; align-items: center; padding: 7px 0; border-bottom: 0.5px solid #f0f0ee; }
.freq-item:last-child { border-bottom: none; }
.fdot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; margin-right: 9px; }
.freq-name { flex: 1; font-size: 14px; }
.freq-fiber { font-size: 11px; color: #e65100; margin-right: 6px; white-space: nowrap; }
.freq-unknown { font-size: 11px; color: #bbb; margin-right: 6px; white-space: nowrap; }
.freq-cat { font-size: 11px; color: #aaa; margin-right: 6px; }
.freq-cnt { font-size: 12px; font-weight: 600; color: #666; background: #f4f4f2; border-radius: 99px; padding: 2px 9px; margin-right: 6px; white-space: nowrap; }
.del-btn { background: none; border: none; color: #ddd; font-size: 18px; cursor: pointer; padding: 0; line-height: 1; }
.del-btn:active { color: #e53935; }

.reset-btn { display: block; width: 100%; padding: 12px; margin-top: 4px; background: none; border: 1px solid #e8e8e8; border-radius: 10px; color: #ccc; font-size: 13px; cursor: pointer; }
</style>
</head>

<!-- NAME SCREEN -->
<div class="name-screen" id="nameScreen" style="display:none">
  <div style="font-size:48px;margin-bottom:16px">🥦</div>
  <h2>Привет! Как тебя зовут?</h2>
  <p>Plural помогает отслеживать разнообразие питания и здоровье микробиома</p>
  <input type="text" class="name-input" id="nameInput" placeholder="Твоё имя..." maxlength="30">
  <button class="name-btn" id="nameBtn">Начать</button>
</div>

<!-- MAIN APP -->
<div class="app" id="mainApp" style="display:none">
  <div class="header">
    <div class="header-top">
      <div style="width:44px"></div>
      <h1>Plural</h1>
      <button class="share-btn" id="shareBtn">Отчёт</button>
    </div>
    <div class="header-name" id="headerName" onclick="changeName()"></div>
  </div>
  <div class="card">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px">
      <div style="width:60px"></div>
      <div class="counter" id="counter">0 <span>/ 50</span></div>
      <button onclick="showInfo50()" style="background:none;border:1px solid #e0e0e0;border-radius:99px;padding:3px 10px;font-size:11px;color:#aaa;cursor:pointer;width:60px">Что это?</button>
    </div>
    <div class="bar-wrap"><div class="bar" id="bar" style="width:0%"></div></div>
    <div class="week-label" id="weekLabel"></div>
    <div class="success" id="success">Цель достигнута — 50 продуктов за неделю!</div>
  </div>
  <div class="card" id="fiberCard"></div>
  <div class="card" id="microbiomeCard"></div>
  <div class="card" id="rainbowCard"></div>
  <div class="card" id="dynamicsCard"></div>
  <div class="cat-grid" id="catGrid"></div>
  <div class="card">
    <div class="slabel">Быстрый выбор</div>
    <div class="cat-tabs" id="catTabs"></div>
    <div class="chips" id="chips"></div>
    <div class="slabel">Свой продукт</div>
    <div class="add-row">
      <input type="text" id="inp" class="food-inp" placeholder="Название продукта..." maxlength="60">
      <input type="number" id="grams" class="gram-inp" placeholder="г" min="1" max="2000">
      <button class="add-btn" id="addBtn">+</button>
    </div>
    <div class="gram-hint">Граммы необязательны — нужны для подсчёта клетчатки</div>
  </div>
  <div class="card" id="freqCard"></div>
  <button class="reset-btn" style="background:#f0f9f2;border-color:#c8e6c9;color:#2d7a3a;font-weight:500;margin-bottom:8px" id="shopBtn">Список покупок на неделю</button>
  <button class="reset-btn" id="resetBtn">Сбросить неделю</button>
</div>

// Коэффициент варёного: клетчатка варёного = сухой * COOKED_RATIO
var COOKED_RATIO = 0.35;

function isCooked(catName) {
  for (var i = 0; i < CATS.length; i++) if (CATS[i].name === catName && CATS[i].cooked) return true;
  return false;
}

function getFiberPer100(name) {
  var n = name.toLowerCase();
  for (var key in FIBER_DRY) if (n.indexOf(key) >= 0 || key.indexOf(n) >= 0) return FIBER_DRY[key];
  return null;
}

function calcFiber(name, grams, cooked) {
  if (!grams || grams <= 0) return null;
  var per100 = getFiberPer100(name);
  if (per100 === null) return null;
  var ratio = cooked ? COOKED_RATIO : 1.0;
  return Math.round(per100 * ratio * grams / 100 * 10) / 10;
}

function inFiberDB(name) { return getFiberPer100(name) !== null; }

var activeCat = 0;
var DAY_NAMES = ['Вс','Пн','Вт','Ср','Чт','Пт','Сб'];

function localDateStr(d) {
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}
function todayStr() { return localDateStr(new Date()); }
function currentMonday() {
  var d = new Date(), day = d.getDay() || 7;
  d.setDate(d.getDate() - (day-1)); d.setHours(0,0,0,0); return d;
}
function mondayMinus(w) { var d = currentMonday(); d.setDate(d.getDate() - w*7); return d; }
function storageKey(mon) { return 'eat50_' + localDateStr(mon); }
function loadWeek(mon) { try { var r = localStorage.getItem(storageKey(mon)); return r ? JSON.parse(r) : []; } catch(e) { return []; } }
function saveWeek(log) { localStorage.setItem(storageKey(currentMonday()), JSON.stringify(log)); }
function uniq(log) {
  var seen = {}, res = [];
  for (var i = 0; i < log.length; i++) { var k = log[i].name.toLowerCase().trim(); if (!seen[k]) { seen[k]=true; res.push(log[i]); } }
  return res;
}
function fmtShort(d) { return d.toLocaleDateString('ru', {day:'numeric', month:'short'}); }
function detectColor(name) {
  var n = name.toLowerCase();
  for (var i = 0; i < RAINBOW.length; i++) for (var j = 0; j < RAINBOW[i].words.length; j++) if (n.indexOf(RAINBOW[i].words[j]) >= 0) return i;
  return -1;
}
function detectCat(name) {
  var n = name.toLowerCase();
  for (var i = 0; i < CATS.length; i++) for (var j = 0; j < CATS[i].words.length; j++) if (n.indexOf(CATS[i].words[j]) >= 0) return CATS[i].name;
  return 'Другое';
}
function catColor(catName) { for (var i = 0; i < CATS.length; i++) if (CATS[i].name === catName) return CATS[i].color; return '#bbb'; }

function renderFiber(log) {
  var today = todayStr(), todayFiber = 0;
  var dayMap = {};
  var mon = currentMonday();
  for (var i = 0; i < 7; i++) {
    var d = new Date(mon.getTime()); d.setDate(mon.getDate()+i);
    dayMap[localDateStr(d)] = {label: DAY_NAMES[d.getDay()], fiber: 0};
  }
  for (var i = 0; i < log.length; i++) {
    var e = log[i];
    if (e.fiber != null) {
      if (e.isoDate === today) todayFiber += e.fiber;
      if (dayMap[e.isoDate]) dayMap[e.isoDate].fiber += e.fiber;
    }
  }
  todayFiber = Math.round(todayFiber * 10) / 10;
  var days = [];
  for (var k in dayMap) days.push({key:k, label:dayMap[k].label, fiber: Math.round(dayMap[k].fiber*10)/10, isToday: k===today});
  days.sort(function(a,b){ return a.key < b.key ? -1 : 1; });
  var maxF = 0; for (var i = 0; i < days.length; i++) if (days[i].fiber > maxF) maxF = days[i].fiber;
  if (maxF === 0) maxF = 30;
  var html = '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">'
    + '<div class="slabel" style="margin-bottom:0">Клетчатка</div>'

    + '</div><div class="dyn-chart">';
  for (var i = 0; i < days.length; i++) {
    var dw = days[i], h = dw.fiber > 0 ? Math.max(4, Math.round(dw.fiber/maxF*60)) : 2;
    html += '<div class="dyn-col">'

      + '<div class="dyn-lbl">' + dw.label + '</div>'

function renderFreq(log) {
  var freq = {};
  for (var i = 0; i < log.length; i++) {
    var k = log[i].name.toLowerCase().trim();
    if (!freq[k]) freq[k] = {name:log[i].name, cat:log[i].cat, count:0, lastIdx:i, totalFiber:0, hasGrams:false, inDB:inFiberDB(log[i].name)};
    freq[k].count++; freq[k].lastIdx=i;
    if (log[i].fiber != null) { freq[k].totalFiber += log[i].fiber; freq[k].hasGrams=true; }
  }
  var items = []; for (var k in freq) items.push(freq[k]);
  items.sort(function(a,b){ return b.count-a.count; });
  var el = document.getElementById('freqCard');
  if (!items.length) { el.innerHTML=''; return; }
  el.innerHTML = '<div class="slabel" style="margin-bottom:10px">Продукты за неделю</div>';
  for (var i = 0; i < items.length; i++) {
    var item = items[i];
    var resolvedCat = item.cat || detectCat(item.name);
    var rainbowIdx = detectColor(item.name);
    var cc = rainbowIdx >= 0 ? RAINBOW[rainbowIdx].hex : catColor(resolvedCat);
    var fiberHtml = '';
    if (item.hasGrams) fiberHtml = '<div class="freq-fiber">' + Math.round(item.totalFiber*10)/10 + ' г клетчатки</div>';

      + '<div class="freq-cat">'+(item.cat==='Другое'?'':(item.cat||''))+'</div>'
      + '<div class="freq-cnt">x'+item.count+'</div>'
      + '<button class="del-btn" data-i="'+item.lastIdx+'">×</button>';
    el.appendChild(row);
  }
  var btns = el.querySelectorAll('.del-btn');
  for (var i = 0; i < btns.length; i++) btns[i].addEventListener('click', function() { deleteItem(parseInt(this.getAttribute('data-i'))); });
}

  for (var i = 0; i < u.length; i++) {
    prebScore += getPrebioticScore(u[i].name);
    if (u[i].cat === 'Ферментированные') fermented.push(u[i].name);
  }
  if (prebScore > 0) lines.push('Пребиотический индекс: ' + prebScore + ' баллов');
  if (fermented.length > 0) lines.push('Ферментированные: ' + fermented.join(', '));
  var catCounts = {};
  for (var i = 0; i < CATS.length; i++) catCounts[CATS[i].name] = 0;
  for (var i = 0; i < u.length; i++) if (u[i].cat && catCounts[u[i].cat]!==undefined) catCounts[u[i].cat]++;
  lines.push('');
  lines.push('По категориям:');
  for (var i = 0; i < CATS.length; i++) if (catCounts[CATS[i].name]>0) lines.push('  ' + CATS[i].icon + ' ' + CATS[i].name + ': ' + catCounts[CATS[i].name]);
  lines.push('');
  lines.push('Все продукты:');
  for (var i = 0; i < u.length; i++) lines.push('  • ' + u[i].name);
  return lines.join('\n');
}

function showShoppingList() {
  var log = loadWeek(currentMonday());
  var u = uniq(log);
  var eaten = {};
  for (var i = 0; i < u.length; i++) {
    if (u[i].cat) {
      if (!eaten[u[i].cat]) eaten[u[i].cat] = [];
      eaten[u[i].cat].push(u[i].name.toLowerCase());
    }
  }

  // Для каждой категории смотрим сколько съедено и предлагаем чего не хватает
  var suggestions = [];
  var TARGETS = {
    'Овощи и зелень': 8, 'Фрукты': 4, 'Ягоды': 3, 'Злаки': 4,
    'Бобовые': 3, 'Орехи/Семена': 3, 'Грибы': 2,
    'Травы и специи': 3, 'Ферментированные': 2
  };

  for (var ci = 0; ci < CATS.length; ci++) {
    var cat = CATS[ci];
    var eatenInCat = eaten[cat.name] || [];
    var target = TARGETS[cat.name] || 3;
    var gap = target - eatenInCat.length;
    if (gap <= 0) continue;

    // Найти продукты из категории которых ещё не ели
    var notEaten = [];
    for (var ii = 0; ii < cat.items.length; ii++) {
      var item = cat.items[ii];
      var alreadyEaten = false;
      for (var jj = 0; jj < eatenInCat.length; jj++) {
        if (eatenInCat[jj] === item.toLowerCase()) { alreadyEaten = true; break; }
      }
      if (!alreadyEaten) notEaten.push(item);
    }

    // Берём до 3 предложений на категорию
    var picks = notEaten.slice(0, Math.min(3, gap));
    if (picks.length > 0) {
      suggestions.push({
        cat: cat.name,
        icon: cat.icon,
        color: cat.color,
        items: picks,
        eaten: eatenInCat.length,
        target: target
      });
    }
  }

  var existing = document.getElementById('shopping-popup');
  if (existing) { existing.remove(); return; }

  var overlay = document.createElement('div');
  overlay.id = 'shopping-popup';
  overlay.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.45);z-index:2000;display:flex;align-items:flex-end;justify-content:center;';

  var listText = '🛒 Plural — список покупок\n' + new Date().toLocaleDateString('ru', {day:'numeric', month:'long'}) + '\n\n';
  var innerHtml = '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">'
    + '<div style="font-size:16px;font-weight:600">Список покупок</div>'
    + '<button onclick="document.getElementById(\'shopping-popup\').remove()" style="background:none;border:none;font-size:22px;color:#bbb;cursor:pointer">×</button>'
    + '</div>'
    + '<div style="font-size:13px;color:#888;margin-bottom:16px">Продукты которых не хватает для разнообразной недели</div>';

  if (suggestions.length === 0) {
    innerHtml += '<div style="text-align:center;padding:20px 0;font-size:14px;color:#2d7a3a;font-weight:500">Отличная неделя — все категории закрыты!</div>';
    listText += 'Все категории закрыты — отличная неделя!';
  } else {
    for (var si = 0; si < suggestions.length; si++) {
      var s = suggestions[si];
      listText += s.icon + ' ' + s.cat + ':\n';
      innerHtml += '<div style="margin-bottom:14px">'
        + '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">'
        + '<div style="display:flex;align-items:center;gap:6px">'
        + '<span style="font-size:15px">' + s.icon + '</span>'
        + '<span style="font-size:13px;font-weight:600;color:#1a1a1a">' + s.cat + '</span>'
        + '</div>'
        + '<span style="font-size:11px;color:#bbb">' + s.eaten + ' из ' + s.target + ' съедено</span>'
        + '</div>'
        + '<div style="display:flex;flex-wrap:wrap;gap:6px">';
      for (var ii = 0; ii < s.items.length; ii++) {
        innerHtml += '<div style="padding:6px 12px;background:#f7f7f5;border:1px solid #e0e0e0;border-radius:99px;font-size:13px;color:#333">'
          + s.items[ii] + '</div>';
        listText += '  • ' + s.items[ii] + '\n';
      }
      innerHtml += '</div></div>';
      listText += '\n';
    }
  }

  innerHtml += '<div style="display:flex;gap:8px;margin-top:4px">'
    + '<button id="shop-copy" style="flex:1;padding:12px;background:#f0f9f2;border:1px solid #c8e6c9;border-radius:12px;font-size:14px;color:#2d7a3a;cursor:pointer;font-weight:500">Скопировать</button>'
    + '<button id="shop-share" style="flex:1;padding:12px;background:#2d7a3a;border:none;border-radius:12px;font-size:14px;color:#fff;cursor:pointer;font-weight:500">Поделиться</button>'
    + '</div>';

  overlay.innerHTML = '<div style="background:#fff;border-radius:20px 20px 0 0;padding:24px 20px 32px;width:100%;max-width:480px;max-height:85vh;overflow-y:auto;">'
    + innerHtml + '</div>';

  document.body.appendChild(overlay);
  overlay.addEventListener('click', function(e) { if (e.target === overlay) overlay.remove(); });

  overlay.querySelector('#shop-copy').addEventListener('click', function() {
    navigator.clipboard.writeText(listText).then(function() {
      var btn = overlay.querySelector('#shop-copy');
      btn.textContent = 'Скопировано!';
      setTimeout(function() { btn.textContent = 'Скопировать'; }, 2000);
    }).catch(function() { prompt('Скопируй список:', listText); });
  });

  overlay.querySelector('#shop-share').addEventListener('click', function() {
    if (navigator.share) {
      navigator.share({title: 'Список покупок Plural', text: listText}).catch(function(){});
    } else {
      navigator.clipboard.writeText(listText).then(function() {
        alert('Список скопирован в буфер обмена');
      });
    }
  });
}

function addItem(name, cat, grams, cooked) {
  var n = name.trim(); if (!n) return;
  var resolvedCat = cat || detectCat(n);
  var fiberVal = grams ? calcFiber(n, grams, cooked) : null;
  var log = loadWeek(currentMonday());
  var today = new Date().toLocaleDateString('ru', {day:'numeric', month:'short'});
  log.push({name:n, cat:resolvedCat, date:today, isoDate:todayStr(), grams:grams||null, cooked:!!cooked, fiber:fiberVal});
  saveWeek(log); render();
}

function deleteItem(idx) {
  var log = loadWeek(currentMonday());
  if (idx>=0 && idx<log.length) { log.splice(idx,1); saveWeek(log); render(); }
}

document.getElementById('addBtn').addEventListener('click', function() {
  var n = document.getElementById('inp').value.trim(); if (!n) return;
  var g = parseInt(document.getElementById('grams').value) || null;
  addItem(n, null, g, false);
  document.getElementById('inp').value = ''; document.getElementById('grams').value = '';
});
document.getElementById('inp').addEventListener('keydown', function(e) {
  if (e.key==='Enter') { var n=this.value.trim(); if(!n) return; var g=parseInt(document.getElementById('grams').value)||null; addItem(n,null,g,false); this.value=''; document.getElementById('grams').value=''; }
});

document.getElementById('resetBtn').addEventListener('click', function() {
  if (confirm('Сбросить все продукты этой недели?')) { localStorage.removeItem(storageKey(currentMonday())); render(); }
});
