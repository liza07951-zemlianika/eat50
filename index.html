<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Plural">
<meta name="theme-color" content="#f2f4f0">
<title>Plural</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html { -webkit-text-size-adjust: 100%; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f2f4f0; color: #1a1a1a; min-height: 100vh; min-height: -webkit-fill-available; }
.app { max-width: 480px; margin: 0 auto; padding: 16px 16px max(48px, env(safe-area-inset-bottom, 48px)); }
.name-screen { min-height: 100vh; min-height: -webkit-fill-available; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 32px 24px max(32px, env(safe-area-inset-bottom, 32px)); text-align: center; }
.name-screen h2 { font-size: 24px; font-weight: 600; margin-bottom: 8px; }
.name-screen p { font-size: 15px; color: #888; margin-bottom: 28px; line-height: 1.5; }
.name-input { width: 100%; padding: 14px 16px; border: 1px solid #e0e0e0; border-radius: 12px; font-size: 17px; outline: none; background: #fff; margin-bottom: 12px; -webkit-appearance: none; }
.name-input:focus { border-color: #4caf6e; }
.name-btn { width: 100%; padding: 16px; background: #2d7a3a; color: #fff; border: none; border-radius: 12px; font-size: 17px; font-weight: 600; cursor: pointer; min-height: 52px; }
.header { padding: 20px 0 8px; }
.header-top { display: flex; align-items: center; justify-content: space-between; }
.header-brand { display: flex; align-items: center; gap: 8px; }
.header-title {
  font-size: 22px;
  font-weight: 300;
  color: #1a1a1a;
  letter-spacing: 0.5px;
  position: relative;
  display: inline-block;
  padding-bottom: 2px;
}
.header-underline {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  height: 2px;
  background: #FA9109;
  border-radius: 99px;
}
.header-name { font-size: 13px; color: #aaa; margin-top: 5px; cursor: pointer; min-height: 28px; display: flex; align-items: center; }
.share-btn { background: #f0f9f2; border: 1px solid #c8e6c9; border-radius: 10px; padding: 8px 14px; font-size: 13px; color: #2d7a3a; cursor: pointer; font-weight: 500; white-space: nowrap; flex-shrink: 0; min-height: 36px; }
.action-panel { display: flex; gap: 8px; margin: 4px 0 14px; }
.action-btn { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 5px; padding: 12px 6px; border-radius: 14px; border: none; cursor: pointer; font-size: 12px; font-weight: 500; min-height: 64px; }
.action-btn-green { background: #e8f5ee; color: #2d7a3a; }
.action-btn-purple { background: #f0f4ff; color: #5c6bc0; }
.action-btn-gray { background: #f4f4f2; color: #888; }
.dashboard-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 12px 0; }
.dash-card { background: #fff; border-radius: 16px; padding: 14px; cursor: pointer; position: relative; min-height: 110px; display: flex; flex-direction: column; justify-content: space-between; transition: transform 0.1s; }
.dash-card:active { transform: scale(0.97); }
.dash-label { font-size: 11px; color: #aaa; font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 6px; }
.dash-value { font-size: 32px; font-weight: 700; line-height: 1; }
.dash-sub { font-size: 12px; color: #aaa; margin-top: 4px; }
.dash-arrow { position: absolute; top: 12px; right: 12px; font-size: 14px; color: #e0e0e0; }
.dash-bar { height: 4px; border-radius: 99px; background: #eee; overflow: hidden; margin-top: 8px; }
.dash-bar-fill { height: 100%; border-radius: 99px; transition: width 0.4s; }
.dash-rainbow { display: flex; gap: 3px; margin-top: 8px; }
.dash-rainbow-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
.dash-mini-chart { display: flex; align-items: flex-end; gap: 3px; height: 32px; margin-top: 6px; }
.dash-mini-bar { flex: 1; border-radius: 2px 2px 0 0; min-height: 2px; background: #c8e6c9; }
.dash-mini-bar.cur { background: #4caf6e; }
.card { background: #fff; border-radius: 16px; padding: 16px 18px; margin: 12px 0; }
.slabel { font-size: 11px; color: #aaa; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 12px; }
.counter { font-size: 50px; font-weight: 700; color: #2d7a3a; text-align: center; line-height: 1; }
.counter span { font-size: 22px; color: #bbb; font-weight: 400; }
.bar-wrap { margin: 14px 0 6px; background: #eee; border-radius: 99px; height: 10px; overflow: hidden; }
.bar { height: 100%; background: #4caf6e; border-radius: 99px; transition: width 0.4s; }
.week-label { font-size: 12px; color: #bbb; text-align: center; }
.success { background: #e8f5ee; border-radius: 10px; padding: 10px 14px; margin-top: 12px; font-size: 14px; color: #2d7a3a; font-weight: 500; text-align: center; display: none; }
.rainbow-bar-wrap { height: 26px; border-radius: 8px; overflow: hidden; display: flex; margin: 10px 0; background: #f0f0ee; }
.rainbow-seg { height: 100%; transition: width 0.4s; }
.rainbow-legend { display: flex; flex-wrap: wrap; gap: 5px 10px; }
.rleg { display: flex; align-items: center; gap: 4px; font-size: 11px; color: #555; }
.rleg-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.rleg.off { opacity: 0.3; }
.dyn-chart { display: flex; align-items: flex-end; gap: 5px; height: 72px; margin-top: 10px; }
.dyn-col { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; height: 100%; justify-content: flex-end; }
.dyn-bar { width: 100%; border-radius: 4px 4px 0 0; background: #c8e6c9; min-height: 2px; }
.dyn-bar.cur { background: #4caf6e; }
.dyn-bar.fiber { background: #ffe082; }
.dyn-bar.fiber.cur { background: #ffb300; }
.dyn-num { font-size: 11px; font-weight: 600; color: #666; }
.dyn-lbl { font-size: 10px; color: #bbb; }
.fiber-big { font-size: 38px; font-weight: 700; color: #e65100; line-height: 1; }
.fiber-unit { font-size: 15px; color: #aaa; }
.cat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin: 12px 0; }
.cat-card { background: #fff; border-radius: 12px; padding: 11px 13px; }
.cat-icon { font-size: 16px; margin-bottom: 2px; }
.cat-name { font-size: 11px; color: #aaa; }
.cat-count { font-size: 21px; font-weight: 600; margin-top: 1px; }
.cat-tabs { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; }
.cat-tab { padding: 8px 12px; border-radius: 99px; border: 1px solid #e0e0e0; background: #f7f7f5; font-size: 13px; cursor: pointer; color: #555; min-height: 36px; }
.cat-tab.active { background: #2d7a3a; color: #fff; border-color: #2d7a3a; }
.chips { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 14px; }
.chip { padding: 8px 14px; background: #f0f9f2; border: 1px solid #c8e6c9; border-radius: 99px; font-size: 14px; cursor: pointer; color: #2d7a3a; min-height: 36px; display: flex; align-items: center; }
.chip:active { background: #2d7a3a; color: #fff; }
.add-row { display: flex; gap: 8px; align-items: center; }
.food-inp { flex: 1; padding: 12px 13px; border: 1px solid #e0e0e0; border-radius: 10px; font-size: 16px; outline: none; background: #fafafa; min-width: 0; min-height: 44px; -webkit-appearance: none; }
.food-inp:focus { border-color: #4caf6e; background: #fff; }
.gram-inp { width: 68px; padding: 12px 8px; border: 1px solid #e0e0e0; border-radius: 10px; font-size: 15px; outline: none; background: #fafafa; text-align: center; color: #555; flex-shrink: 0; min-height: 44px; -webkit-appearance: none; }
.gram-inp:focus { border-color: #ffb300; background: #fff; }
.add-btn { padding: 12px 16px; background: #2d7a3a; color: #fff; border: none; border-radius: 10px; font-size: 18px; font-weight: 500; cursor: pointer; flex-shrink: 0; min-height: 44px; min-width: 44px; }
.gram-hint { font-size: 12px; color: #bbb; margin-top: 6px; }
.freq-item { display: flex; align-items: center; padding: 9px 0; border-bottom: 0.5px solid #f0f0ee; min-height: 44px; }
.freq-item:last-child { border-bottom: none; }
.fdot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; margin-right: 9px; }
.freq-name { flex: 1; font-size: 14px; }
.freq-fiber { font-size: 11px; color: #e65100; margin-right: 6px; white-space: nowrap; }
.freq-unknown { font-size: 11px; color: #bbb; margin-right: 6px; white-space: nowrap; }
.freq-cat { font-size: 11px; color: #aaa; margin-right: 6px; }
.freq-cnt { font-size: 12px; font-weight: 600; color: #666; background: #f4f4f2; border-radius: 99px; padding: 3px 9px; margin-right: 6px; white-space: nowrap; }
.del-btn { background: none; border: none; color: #ddd; font-size: 20px; cursor: pointer; padding: 0; line-height: 1; min-width: 32px; min-height: 44px; display: flex; align-items: center; justify-content: center; }
.del-btn:active { color: #e53935; }
.reset-btn { display: block; width: 100%; padding: 14px; margin-top: 4px; background: none; border: 1px solid #e8e8e8; border-radius: 10px; color: #ccc; font-size: 14px; cursor: pointer; min-height: 48px; }
.sheet-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 2000; display: flex; align-items: flex-end; justify-content: center; }
.sheet-inner { background: #fff; border-radius: 20px 20px 0 0; width: 100%; max-width: 480px; max-height: 88vh; max-height: 88dvh; overflow-y: auto; -webkit-overflow-scrolling: touch; overscroll-behavior: contain; padding: 12px 20px max(32px, env(safe-area-inset-bottom, 32px)); }
.sheet-handle { width: 36px; height: 4px; background: #e0e0e0; border-radius: 99px; margin: 0 auto 20px; }
.center-popup { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #fff; border-radius: 16px; padding: 20px; box-shadow: 0 8px 40px rgba(0,0,0,0.2); z-index: 3000; width: calc(100vw - 48px); max-width: 360px; max-height: 80vh; max-height: 80dvh; overflow-y: auto; -webkit-overflow-scrolling: touch; }
button:active { opacity: 0.75; }
</style>
</head>
<body>

<!-- NAME SCREEN -->
<div class="name-screen" id="nameScreen" style="display:none">
  <div style="font-size:48px;margin-bottom:16px">🥦</div>
  <h2>Привет! Как тебя зовут?</h2>
  <p>Plural помогает отслеживать разнообразие питания и здоровье микробиома</p>
  <input type="text" class="name-input" id="nameInput" placeholder="Твоё имя..." maxlength="30">
  <button class="name-btn" id="nameBtn">Начать</button>
</div>

<!-- MAIN APP -->
<div class="app" id="mainApp" style="display:none">
  <div class="header">

        <span class="header-title">plural<span class="header-underline"></span></span>
      </div>
      <button class="share-btn" id="shareBtn">Отчёт</button>
    </div>
    <div class="header-name" id="headerName" onclick="changeName()"></div>
  </div>

  <!-- ACTION PANEL -->
  <div class="action-panel">
    <button class="action-btn action-btn-green" id="shopBtn">
      <svg width="18" height="18" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M4 4h12l-1.5 8H5.5L4 4z"/><circle cx="8" cy="17" r="1"/><circle cx="14" cy="17" r="1"/><path d="M2 2h2l.5 2"/></svg>
      Покупки
    </button>

      <svg width="18" height="18" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M10 3.5C10 3.5 4 7 4 12a6 6 0 0012 0c0-5-6-8.5-6-8.5z"/><path d="M10 8v5M7.5 10.5h5"/></svg>

      <button onclick="showInfo50()" style="background:none;border:1px solid #e0e0e0;border-radius:99px;padding:3px 10px;font-size:11px;color:#aaa;cursor:pointer;width:60px">Что это?</button>

    <div class="bar-wrap"><div class="bar" id="bar" style="width:0%"></div></div>
    <div class="week-label" id="weekLabel"></div>
    <div class="success" id="success">Цель достигнута — 50 продуктов за неделю!</div>
  </div>
  <div class="dashboard-grid" id="dashboardGrid"></div>
  <div class="cat-grid" id="catGrid"></div>
  <div class="card">
    <div class="slabel">Быстрый выбор</div>
    <div class="cat-tabs" id="catTabs"></div>
    <div class="chips" id="chips"></div>
    <div class="slabel">Свой продукт</div>
    <div class="add-row">
      <input type="text" id="inp" class="food-inp" placeholder="Название продукта..." maxlength="60">
      <input type="number" id="grams" class="gram-inp" placeholder="г" min="1" max="2000">
      <button class="add-btn" id="addBtn">+</button>
    </div>
    <div class="gram-hint">Граммы необязательны — нужны для подсчёта клетчатки</div>
  </div>
  <div class="card" id="freqCard"></div>
</div>

// Коэффициент варёного: клетчатка варёного = сухой * COOKED_RATIO
var COOKED_RATIO = 0.35;

function isCooked(catName) {
  for (var i = 0; i < CATS.length; i++) if (CATS[i].name === catName && CATS[i].cooked) return true;
  return false;
}

function getFiberPer100(name) {
  var n = name.toLowerCase();
  for (var key in FIBER_DRY) if (n.indexOf(key) >= 0 || key.indexOf(n) >= 0) return FIBER_DRY[key];
  return null;
}

function calcFiber(name, grams, cooked) {
  if (!grams || grams <= 0) return null;
  var per100 = getFiberPer100(name);
  if (per100 === null) return null;
  var ratio = cooked ? COOKED_RATIO : 1.0;
  return Math.round(per100 * ratio * grams / 100 * 10) / 10;
}

function inFiberDB(name) { return getFiberPer100(name) !== null; }

var activeCat = 0;
var DAY_NAMES = ['Вс','Пн','Вт','Ср','Чт','Пт','Сб'];

function localDateStr(d) {
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}
function todayStr() { return localDateStr(new Date()); }
function currentMonday() {
  var d = new Date(), day = d.getDay() || 7;
  d.setDate(d.getDate() - (day-1)); d.setHours(0,0,0,0); return d;
}
function mondayMinus(w) { var d = currentMonday(); d.setDate(d.getDate() - w*7); return d; }
function storageKey(mon) { return 'eat50_' + localDateStr(mon); }
function loadWeek(mon) { try { var r = localStorage.getItem(storageKey(mon)); return r ? JSON.parse(r) : []; } catch(e) { return []; } }
function saveWeek(log) { localStorage.setItem(storageKey(currentMonday()), JSON.stringify(log)); }
function uniq(log) {
  var seen = {}, res = [];
  for (var i = 0; i < log.length; i++) { var k = log[i].name.toLowerCase().trim(); if (!seen[k]) { seen[k]=true; res.push(log[i]); } }
  return res;
}
function fmtShort(d) { return d.toLocaleDateString('ru', {day:'numeric', month:'short'}); }
function detectColor(name) {
  var n = name.toLowerCase();
  for (var i = 0; i < RAINBOW.length; i++) for (var j = 0; j < RAINBOW[i].words.length; j++) if (n.indexOf(RAINBOW[i].words[j]) >= 0) return i;
  return -1;
}
function detectCat(name) {
  var n = name.toLowerCase();
  for (var i = 0; i < CATS.length; i++) for (var j = 0; j < CATS[i].words.length; j++) if (n.indexOf(CATS[i].words[j]) >= 0) return CATS[i].name;
  return 'Другое';
}
function catColor(catName) { for (var i = 0; i < CATS.length; i++) if (CATS[i].name === catName) return CATS[i].color; return '#bbb'; }

function renderMain(log) {

  document.getElementById('bar').style.width = Math.min(100, Math.round(count/50*100)) + '%';
  document.getElementById('success').style.display = count >= 50 ? 'block' : 'none';
  var mon = currentMonday(), sun = new Date(mon.getTime()); sun.setDate(sun.getDate()+6);
  document.getElementById('weekLabel').textContent = fmtShort(mon) + ' — ' + fmtShort(sun);
}

function renderFiber(log) {
  var today = todayStr(), todayFiber = 0;
  var dayMap = {};
  var mon = currentMonday();
  for (var i = 0; i < 7; i++) {
    var d = new Date(mon.getTime()); d.setDate(mon.getDate()+i);
    dayMap[localDateStr(d)] = {label: DAY_NAMES[d.getDay()], fiber: 0};
  }
  for (var i = 0; i < log.length; i++) {
    var e = log[i];
    if (e.fiber != null) {
      if (e.isoDate === today) todayFiber += e.fiber;
      if (dayMap[e.isoDate]) dayMap[e.isoDate].fiber += e.fiber;
    }
  }
  todayFiber = Math.round(todayFiber * 10) / 10;
  var days = [];
  for (var k in dayMap) days.push({key:k, label:dayMap[k].label, fiber: Math.round(dayMap[k].fiber*10)/10, isToday: k===today});
  days.sort(function(a,b){ return a.key < b.key ? -1 : 1; });
  var maxF = 0; for (var i = 0; i < days.length; i++) if (days[i].fiber > maxF) maxF = days[i].fiber;
  if (maxF === 0) maxF = 30;
  var html = '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">'
    + '<div class="slabel" style="margin-bottom:0">Клетчатка</div>'
    + '<button onclick="showInfoFiber()" style="background:none;border:1px solid #e0e0e0;border-radius:99px;padding:3px 10px;font-size:11px;color:#aaa;cursor:pointer">Что это?</button>'
    + '</div>'
    + '<div style="display:flex;align-items:flex-end;gap:10px;margin-bottom:14px">'
    + '<div class="fiber-big">' + todayFiber + '</div>'
    + '<div><div class="fiber-unit">г сегодня</div></div>'
    + '</div><div class="dyn-chart">';
  for (var i = 0; i < days.length; i++) {
    var dw = days[i], h = dw.fiber > 0 ? Math.max(4, Math.round(dw.fiber/maxF*60)) : 2;
    html += '<div class="dyn-col">'
      + '<div class="dyn-num" style="color:' + (dw.fiber>0 ? '#e65100' : '#ddd') + '">' + (dw.fiber>0 ? dw.fiber : '—') + '</div>'
      + '<div class="dyn-bar fiber' + (dw.isToday ? ' cur' : '') + '" style="height:' + h + 'px"></div>'
      + '<div class="dyn-lbl">' + dw.label + '</div>'
      + '</div>';
  }
  html += '</div>';
  document.getElementById('fiberCard').innerHTML = html;
}

function renderMicrobiome(log) {
  var u = uniq(log);
  var weekScore = 0;
  var fermented = [];
  for (var i = 0; i < u.length; i++) {
    weekScore += getPrebioticScore(u[i].name);
    if (u[i].cat === 'Ферментированные') fermented.push(u[i].name);
  }
  var WEEK_GOAL = 90;
  var pct = Math.min(100, Math.round(weekScore / WEEK_GOAL * 100));
  var level, levelColor, levelBg;
  if (weekScore < 30) { level = 'Низкий'; levelColor = '#c62828'; levelBg = '#ffebee'; }
  else if (weekScore < 60) { level = 'Средний'; levelColor = '#f57f17'; levelBg = '#fff8e1'; }
  else if (weekScore < 90) { level = 'Хороший'; levelColor = '#2d7a3a'; levelBg = '#e8f5ee'; }

    + '<button onclick="showPrebioticInfo()" style="background:none;border:1px solid #e0e0e0;border-radius:99px;padding:3px 10px;font-size:11px;color:#aaa;cursor:pointer">Что это?</button>'

    + '</div></div>'
    + '<div style="background:#f0f0ee;border-radius:99px;height:8px;overflow:hidden;margin-bottom:4px">'
    + '<div style="height:100%;background:' + levelColor + ';border-radius:99px;width:' + pct + '%;transition:width 0.4s"></div>'
    + '</div>'
    + '<div style="font-size:11px;color:#bbb;margin-bottom:14px">цель — ' + WEEK_GOAL + ' баллов в неделю</div>';

  if (fermented.length > 0) {
    html += '<div style="display:flex;align-items:center;gap:8px;padding:10px 12px;background:#e3f2fd;border-radius:10px;margin-bottom:8px">'
      + '<span style="font-size:18px">🫙</span>'
      + '<div><div style="font-size:12px;font-weight:600;color:#0277bd">Ферментированные: ' + fermented.length + '</div>'
      + '<div style="font-size:11px;color:#0277bd;opacity:0.8">' + fermented.join(', ') + '</div></div>'
      + '</div>';
  } else {
    html += '<div style="display:flex;align-items:center;gap:8px;padding:10px 12px;background:#f7f7f5;border-radius:10px;margin-bottom:8px">'
      + '<span style="font-size:18px">🫙</span>'
      + '<div style="font-size:12px;color:#bbb">Ферментированных продуктов пока нет — добавь кефир, квашеную капусту или йогурт</div>'
      + '</div>';
  }

  // Топ продуктов для улучшения
  var top3 = ['Топинамбур (3)', 'Лук (3)', 'Чеснок (3)', 'Семена льна (3)', 'Овёс (3)'];
  var eaten = {};
  for (var i = 0; i < u.length; i++) eaten[u[i].name.toLowerCase()] = true;
  var suggest = [];
  var suggestions = ['Топинамбур','Лук','Чеснок','Семена льна','Овёс','Спаржа','Артишок','Лук-порей','Маш','Чечевица'];
  for (var i = 0; i < suggestions.length && suggest.length < 3; i++) {
    if (!eaten[suggestions[i].toLowerCase()]) suggest.push(suggestions[i]);
  }
  if (suggest.length > 0) {
    html += '<div style="font-size:11px;color:#aaa;margin-top:4px">Добавь для роста баллов: '
      + suggest.map(function(s){ return '<span style="background:#f0f0ee;padding:2px 7px;border-radius:99px;margin-right:4px;color:#555">' + s + '</span>'; }).join('')
      + '</div>';
  }
  html += '</div>';
  document.getElementById('microbiomeCard').innerHTML = html;
}

function renderRainbow(log) {
  var u = uniq(log), counts = [];
  for (var i = 0; i < RAINBOW.length; i++) counts.push(0);
  for (var i = 0; i < u.length; i++) { var ci = detectColor(u[i].name); if (ci >= 0) counts[ci]++; }
  var colored = 0; for (var i = 0; i < counts.length; i++) colored += counts[i];
  var colorsHit = 0; for (var i = 0; i < counts.length; i++) if (counts[i]>0) colorsHit++;
  var html = '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">'
    + '<div class="slabel" style="margin-bottom:0">Радуга в тарелке</div>'
    + '<button onclick="showInfoRainbow()" style="background:none;border:1px solid #e0e0e0;border-radius:99px;padding:3px 10px;font-size:11px;color:#aaa;cursor:pointer">Что это?</button>'
    + '</div>'
    + '<div style="font-size:13px;color:#555;margin-bottom:4px">' + colorsHit + ' из ' + RAINBOW.length + ' цветов</div>'
    + '<div class="rainbow-bar-wrap">';
  if (colored === 0) { html += '<div style="width:100%;background:#f0f0ee"></div>'; }
  else { for (var i = 0; i < RAINBOW.length; i++) { if (!counts[i]) continue; html += '<div class="rainbow-seg" style="width:' + Math.round(counts[i]/colored*100) + '%;background:' + RAINBOW[i].hex + '"></div>'; } }
  html += '</div><div class="rainbow-legend">';
  for (var i = 0; i < RAINBOW.length; i++) html += '<div class="rleg' + (counts[i]>0?'':' off') + '"><div class="rleg-dot" style="background:' + RAINBOW[i].hex + '"></div>' + RAINBOW[i].name + (counts[i]>0?' ('+counts[i]+')':'') + '</div>';
  html += '</div>';

function renderFreq(log) {
  var freq = {};
  for (var i = 0; i < log.length; i++) {
    var k = log[i].name.toLowerCase().trim();
    if (!freq[k]) freq[k] = {name:log[i].name, cat:log[i].cat, count:0, lastIdx:i, totalFiber:0, hasGrams:false, inDB:inFiberDB(log[i].name)};
    freq[k].count++; freq[k].lastIdx=i;
    if (log[i].fiber != null) { freq[k].totalFiber += log[i].fiber; freq[k].hasGrams=true; }
  }
  var items = []; for (var k in freq) items.push(freq[k]);
  items.sort(function(a,b){ return b.count-a.count; });
  var el = document.getElementById('freqCard');
  if (!items.length) { el.innerHTML=''; return; }
  el.innerHTML = '<div class="slabel" style="margin-bottom:10px">Продукты за неделю</div>';
  for (var i = 0; i < items.length; i++) {
    var item = items[i];
    var resolvedCat = item.cat || detectCat(item.name);
    var rainbowIdx = detectColor(item.name);
    var cc = rainbowIdx >= 0 ? RAINBOW[rainbowIdx].hex : catColor(resolvedCat);
    var fiberHtml = '';
    if (item.hasGrams) fiberHtml = '<div class="freq-fiber">' + Math.round(item.totalFiber*10)/10 + ' г клетчатки</div>';
    else if (item.inDB) fiberHtml = '<div class="freq-unknown">укажи граммы</div>';
    var row = document.createElement('div'); row.className = 'freq-item';
    row.innerHTML = '<div class="fdot" style="background:'+cc+'"></div>'
      + '<div class="freq-name">'+item.name+'</div>'
      + fiberHtml
      + '<div class="freq-cat">'+(item.cat==='Другое'?'':(item.cat||''))+'</div>'
      + '<div class="freq-cnt">x'+item.count+'</div>'
      + '<button class="del-btn" data-i="'+item.lastIdx+'">×</button>';
    el.appendChild(row);
  }
  var btns = el.querySelectorAll('.del-btn');
  for (var i = 0; i < btns.length; i++) btns[i].addEventListener('click', function() { deleteItem(parseInt(this.getAttribute('data-i'))); });
}

function buildReport() {
  var name = getName();
  var log = loadWeek(currentMonday());
  var u = uniq(log);
  var mon = currentMonday(), sun = new Date(mon.getTime()); sun.setDate(sun.getDate()+6);
  var lines = [];
  lines.push('🌿 Plural — отчёт за неделю');
  lines.push(name + ' · ' + fmtShort(mon) + ' — ' + fmtShort(sun));
  lines.push('');

  // ПРОДУКТЫ
  lines.push('📊 РАЗНООБРАЗИЕ');
  lines.push('Уникальных продуктов: ' + u.length + ' / 50');
  var prevLog = loadWeek(mondayMinus(1));
  var prevCount = uniq(prevLog).length;
  if (prevCount > 0) {
    var diff = u.length - prevCount;
    lines.push('Прошлая неделя: ' + prevCount + ' (' + (diff >= 0 ? '+' : '') + diff + ')');
  }

  // РАДУГА
  var colorHits = 0;
  for (var i = 0; i < RAINBOW.length; i++) {
    for (var j = 0; j < u.length; j++) {
      var n = u[j].name.toLowerCase();
      var found = false;
      for (var k = 0; k < RAINBOW[i].words.length; k++) {
        if (n.indexOf(RAINBOW[i].words[k]) >= 0) { found = true; break; }
      }
      if (found) { colorHits++; break; }
    }
  }
  lines.push('Цветов радуги: ' + colorHits + ' / ' + RAINBOW.length);
  lines.push('');

  // КЛЕТЧАТКА
  var totalFiber = 0;
  for (var i = 0; i < log.length; i++) if (log[i].fiber) totalFiber += log[i].fiber;
  if (totalFiber > 0) {
    lines.push('🌱 КЛЕТЧАТКА');
    lines.push('За неделю: ' + Math.round(totalFiber*10)/10 + ' г');
    lines.push('');
  }

  // МИКРОБИОМ
  var prebScore = 0, fermented = [];
  for (var i = 0; i < u.length; i++) {
    prebScore += getPrebioticScore(u[i].name);
    if (u[i].cat === 'Ферментированные') fermented.push(u[i].name);
  }
  lines.push('🦠 МИКРОБИОМ');
  lines.push('Пребиотический индекс: ' + prebScore + ' / 90 баллов');
  if (fermented.length > 0) lines.push('Ферментированные (' + fermented.length + '): ' + fermented.join(', '));
  else lines.push('Ферментированные: не добавлено');
  lines.push('');

  // КАТЕГОРИИ
  var catCounts = {};
  for (var i = 0; i < CATS.length; i++) catCounts[CATS[i].name] = 0;
  for (var i = 0; i < u.length; i++) if (u[i].cat && catCounts[u[i].cat]!==undefined) catCounts[u[i].cat]++;
  lines.push('🗂 ПО КАТЕГОРИЯМ');
  for (var i = 0; i < CATS.length; i++) {
    if (catCounts[CATS[i].name] > 0) lines.push('  ' + CATS[i].icon + ' ' + CATS[i].name + ': ' + catCounts[CATS[i].name]);
  }
  lines.push('');

  // САМОЧУВСТВИЕ
  var wellnessDays = loadWeekWellness();
  var filledDays = wellnessDays.filter(function(d) { return d.data; });
  if (filledDays.length > 0) {
    lines.push('💜 САМОЧУВСТВИЕ');
    var bloatLabels = ['нет','лёгкое','сильное'];
    var bristolLabels = ['','твёрдый (1-2)','норма (3-4)','мягкий (5-6)','жидкий (7)'];
    var freqLabels = ['реже 1 раза','1-2 раза','3+ раз'];
    for (var i = 0; i < filledDays.length; i++) {
      var d = filledDays[i], w = d.data;
      var line = DAY_NAMES[new Date(d.iso).getDay()] + ': ';
      line += 'энергия ' + w.energy + '/5';
      if (w.bloating !== undefined) line += ' · вздутие: ' + bloatLabels[w.bloating];
      if (w.bloatingTime && w.bloatingTime.length > 0) line += ' (' + w.bloatingTime.join(', ') + ')';
      if (w.bristol > 0) line += ' · стул: ' + bristolLabels[w.bristol];
      if (w.stoolFreq !== undefined) line += ' · ' + freqLabels[w.stoolFreq];
      lines.push('  ' + line);
    }
    var avgEnergy = Math.round(filledDays.reduce(function(s,d){ return s + d.data.energy; }, 0) / filledDays.length * 10) / 10;
    lines.push('  Средняя энергия за неделю: ' + avgEnergy + '/5');
    lines.push('');
  }

  // ВСЕ ПРОДУКТЫ
  lines.push('🥗 ВСЕ ПРОДУКТЫ (' + u.length + ')');
  for (var i = 0; i < u.length; i++) lines.push('  • ' + u[i].name);

  return lines.join('\n');
}

function showShoppingList() {
  var log = loadWeek(currentMonday());
  var u = uniq(log);
  var eaten = {};
  for (var i = 0; i < u.length; i++) {
    if (u[i].cat) {
      if (!eaten[u[i].cat]) eaten[u[i].cat] = [];
      eaten[u[i].cat].push(u[i].name.toLowerCase());
    }
  }

  var TARGETS = {
    'Овощи и зелень': 8, 'Фрукты': 4, 'Ягоды': 3, 'Злаки': 4,
    'Бобовые': 3, 'Орехи/Семена': 3, 'Грибы': 2,
    'Травы и специи': 3, 'Ферментированные': 2
  };

  // Для каждой категории собираем полный пул незасчитанных продуктов
  var suggestions = [];
  for (var ci = 0; ci < CATS.length; ci++) {
    var cat = CATS[ci];
    var eatenInCat = eaten[cat.name] || [];
    var target = TARGETS[cat.name] || 3;
    var gap = target - eatenInCat.length;
    if (gap <= 0) continue;
    var pool = [];
    for (var ii = 0; ii < cat.items.length; ii++) {
      var item = cat.items[ii];
      var already = false;
      for (var jj = 0; jj < eatenInCat.length; jj++) {
        if (eatenInCat[jj] === item.toLowerCase()) { already = true; break; }
      }
      if (!already) pool.push(item);
    }
    if (pool.length > 0) {
      suggestions.push({
        cat: cat.name, icon: cat.icon, color: cat.color,
        pool: pool, // полный пул для замены
        picks: pool.slice(0, Math.min(3, gap)), // текущие показанные
        pickIdxs: [0, 1, 2].slice(0, Math.min(3, gap)), // индексы в пуле
        eaten: eatenInCat.length, target: target
      });
    }
  }

  var existing = document.getElementById('shopping-popup');
  if (existing) { existing.remove(); return; }

  var overlay = document.createElement('div');
  overlay.id = 'shopping-popup';
  overlay.className = 'sheet-overlay';

  function buildListText() {
    var t = '🛒 Plural — список покупок\n' + new Date().toLocaleDateString('ru', {day:'numeric', month:'long'}) + '\n\n';
    for (var si = 0; si < suggestions.length; si++) {
      var s = suggestions[si];
      t += s.icon + ' ' + s.cat + ':\n';
      for (var ii = 0; ii < s.picks.length; ii++) t += '  • ' + s.picks[ii] + '\n';
      t += '\n';
    }
    return t;
  }

  function buildInnerHtml() {
    var h = '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">'
      + '<div style="font-size:16px;font-weight:600">Список покупок</div>'
      + '<button onclick="document.getElementById(\'shopping-popup\').remove()" style="background:none;border:none;font-size:22px;color:#bbb;cursor:pointer">×</button>'
      + '</div>'
      + '<div style="font-size:13px;color:#888;margin-bottom:16px">Тапни на продукт чтобы заменить на другой</div>';

    if (suggestions.length === 0) {
      h += '<div style="text-align:center;padding:20px 0;font-size:14px;color:#2d7a3a;font-weight:500">Отличная неделя — все категории закрыты!</div>';
    } else {
      for (var si = 0; si < suggestions.length; si++) {
        var s = suggestions[si];
        h += '<div style="margin-bottom:14px">'
          + '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">'
          + '<div style="display:flex;align-items:center;gap:6px">'
          + '<span style="font-size:15px">' + s.icon + '</span>'
          + '<span style="font-size:13px;font-weight:600;color:#1a1a1a">' + s.cat + '</span>'
          + '</div>'
          + '<span style="font-size:11px;color:#bbb">' + s.eaten + ' из ' + s.target + '</span>'
          + '</div>'
          + '<div style="display:flex;flex-wrap:wrap;gap:6px">';
        for (var ii = 0; ii < s.picks.length; ii++) {
          h += '<div class="shop-item" data-si="' + si + '" data-ii="' + ii + '" '
            + 'style="padding:6px 12px;background:#f7f7f5;border:1px solid #e0e0e0;border-radius:99px;font-size:13px;color:#333;cursor:pointer;display:flex;align-items:center;gap:5px;">'
            + s.picks[ii]
            + '<span style="font-size:10px;color:#bbb">↻</span>'
            + '</div>';
        }
        h += '</div></div>';
      }
    }

    h += '<div style="display:flex;gap:8px;margin-top:8px">'
      + '<button id="shop-copy" style="flex:1;padding:12px;background:#f0f9f2;border:1px solid #c8e6c9;border-radius:12px;font-size:14px;color:#2d7a3a;cursor:pointer;font-weight:500">Скопировать</button>'
      + '<button id="shop-share" style="flex:1;padding:12px;background:#2d7a3a;border:none;border-radius:12px;font-size:14px;color:#fff;cursor:pointer;font-weight:500">Поделиться</button>'
      + '</div>';
    return h;
  }

  function rerenderInner() {
    var inner = overlay.querySelector('.shop-inner');
    inner.innerHTML = buildInnerHtml();
    bindEvents();
  }

  function bindEvents() {
    // Замена продукта по тапу
    var items = overlay.querySelectorAll('.shop-item');
    for (var i = 0; i < items.length; i++) {
      items[i].addEventListener('click', function() {
        var si = parseInt(this.getAttribute('data-si'));
        var ii = parseInt(this.getAttribute('data-ii'));
        var s = suggestions[si];
        // Найти следующий в пуле который ещё не показан
        var currentPicks = s.picks.slice();
        var currentIdx = s.pickIdxs[ii];
        var nextIdx = (currentIdx + 1) % s.pool.length;
        var tries = 0;
        while (tries < s.pool.length) {
          var alreadyShown = false;
          for (var jj = 0; jj < s.pickIdxs.length; jj++) {
            if (jj !== ii && s.pickIdxs[jj] === nextIdx) { alreadyShown = true; break; }
          }
          if (!alreadyShown) break;
          nextIdx = (nextIdx + 1) % s.pool.length;
          tries++;
        }
        s.picks[ii] = s.pool[nextIdx];
        s.pickIdxs[ii] = nextIdx;
        rerenderInner();
      });
    }

    overlay.querySelector('#shop-copy').addEventListener('click', function() {
      var text = buildListText();
      navigator.clipboard.writeText(text).then(function() {
        var btn = overlay.querySelector('#shop-copy');
        btn.textContent = 'Скопировано!';
        setTimeout(function() { btn.textContent = 'Скопировать'; }, 2000);
      }).catch(function() { prompt('Скопируй список:', text); });
    });

    overlay.querySelector('#shop-share').addEventListener('click', function() {
      var text = buildListText();
      if (navigator.share) {
        navigator.share({title: 'Список покупок Plural', text: text}).catch(function(){});
      } else {
        navigator.clipboard.writeText(text).then(function() {
          alert('Список скопирован');
        });
      }
    });
  }

  overlay.innerHTML = '<div class="sheet-inner">'
    + buildInnerHtml() + '</div>';

  document.body.appendChild(overlay);
  overlay.addEventListener('click', function(e) { if (e.target === overlay) overlay.remove(); });
  bindEvents();
}

function wellnessKey() { return 'plural_wellness_' + localDateStr(new Date()); }

  try { var r = localStorage.getItem('plural_wellness_' + isoDate); return r ? JSON.parse(r) : null; } catch(e) { return null; }
}
function saveWellness(data) { localStorage.setItem(wellnessKey(), JSON.stringify(data)); }
function loadWeekWellness() {
  var mon = currentMonday(); var days = [];
  for (var i = 0; i < 7; i++) {
    var d = new Date(mon.getTime()); d.setDate(mon.getDate() + i);
    var iso = localDateStr(d);
    days.push({ iso: iso, label: DAY_NAMES[d.getDay()], data: loadWellness(iso), isToday: iso === todayStr() });
  }
  return days;
}

  html += '<div style="margin-bottom:14px">'
    + '<div style="font-size:11px;color:#aaa;margin-bottom:6px">Энергия</div>'
    + '<div style="display:flex;align-items:flex-end;gap:5px;height:52px">';
  for (var i = 0; i < days.length; i++) {
    var d = days[i], e = d.data ? d.data.energy : 0;
    var h = e > 0 ? Math.round(e / 5 * 44) : 2;
    var col = d.isToday ? '#5c6bc0' : '#c5c8f6';
    html += '<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;height:100%;justify-content:flex-end">'
      + '<div style="font-size:10px;font-weight:600;color:'+(e>0?'#5c6bc0':'#ddd')+'">'+(e>0?e:'—')+'</div>'
      + '<div style="width:100%;border-radius:3px 3px 0 0;background:'+col+';height:'+h+'px"></div>'
      + '<div style="font-size:10px;color:#bbb">'+d.label+'</div>'
      + '</div>';
  }
  html += '</div></div>';

  // Вздутие по дням
  html += '<div style="margin-bottom:14px">'
    + '<div style="font-size:11px;color:#aaa;margin-bottom:6px">Вздутие</div>'
    + '<div style="display:flex;gap:5px">';
  var bloatColors = ['#e8f5ee','#fff8e1','#ffebee'];
  var bloatLabels = ['Нет','Лёгкое','Сильное'];
  for (var i = 0; i < days.length; i++) {
    var d = days[i], bv = d.data ? d.data.bloating : -1;
    var bg = bv >= 0 ? bloatColors[bv] : '#f7f7f5';
    var tc = bv >= 0 ? ['#2d7a3a','#f57f17','#c62828'][bv] : '#ddd';
    html += '<div style="flex:1;border-radius:8px;background:'+bg+';padding:5px 2px;text-align:center">'
      + '<div style="font-size:9px;color:'+tc+';font-weight:600;line-height:1.3">'+(bv>=0?bloatLabels[bv]:'—')+'</div>'
      + '<div style="font-size:9px;color:#bbb">'+d.label+'</div>'
      + '</div>';
  }
  html += '</div></div>';

  // Корреляция
  var corrDays = days.filter(function(d) { return d.data && d.data.energy > 0; });
  if (corrDays.length >= 3) {
    var log = loadWeek(currentMonday());
    var u = uniq(log);
    var dailyPrebiotic = {};
    var mon2 = currentMonday();
    for (var i = 0; i < 7; i++) {
      var dd = new Date(mon2.getTime()); dd.setDate(mon2.getDate() + i);
      dailyPrebiotic[localDateStr(dd)] = 0;
    }
    for (var i = 0; i < u.length; i++) {
      if (u[i].isoDate && dailyPrebiotic[u[i].isoDate] !== undefined) {
        dailyPrebiotic[u[i].isoDate] += getPrebioticScore(u[i].name);
      }
    }
    var highPreb = corrDays.filter(function(d) { return dailyPrebiotic[d.iso] >= 6; });
    var lowPreb = corrDays.filter(function(d) { return dailyPrebiotic[d.iso] < 6; });
    var avgHigh = highPreb.length > 0 ? Math.round(highPreb.reduce(function(s,d){ return s+d.data.energy; },0) / highPreb.length * 10) / 10 : null;
    var avgLow = lowPreb.length > 0 ? Math.round(lowPreb.reduce(function(s,d){ return s+d.data.energy; },0) / lowPreb.length * 10) / 10 : null;

    if (avgHigh !== null && avgLow !== null && highPreb.length >= 1 && lowPreb.length >= 1) {
      var diff = Math.round((avgHigh - avgLow) * 10) / 10;
      var insight = diff > 0
        ? 'В дни с высоким пребиотическим индексом энергия в среднем на ' + diff + ' балла выше'
        : diff < 0
        ? 'Пока нет чёткой связи между питанием и энергией — продолжай заполнять'
        : 'Связь между питанием и энергией пока не выражена';
      html += '<div style="background:#f0f4ff;border-radius:10px;padding:10px 12px;font-size:12px;color:#5c6bc0;line-height:1.5">'
        + '📊 ' + insight + '</div>';
    }
  } else if (corrDays.length > 0) {
    html += '<div style="font-size:12px;color:#bbb;text-align:center;padding:4px 0">Заполни ещё ' + (3 - corrDays.length) + ' дня чтобы увидеть корреляцию с питанием</div>';
  }

  el.innerHTML = html;
}

function renderDashboard(log) {
  var u = uniq(log);
  var grid = document.getElementById('dashboardGrid');
  if (!grid) return;

  // 1. Клетчатка сегодня
  var todayFiber = 0;
  var today = todayStr();
  for (var i = 0; i < log.length; i++) if (log[i].fiber && log[i].isoDate === today) todayFiber += log[i].fiber;
  todayFiber = Math.round(todayFiber * 10) / 10;

  // 2. Микробиом
  var prebScore = 0, fermentedCount = 0;
  for (var i = 0; i < u.length; i++) {
    prebScore += getPrebioticScore(u[i].name);
    if (u[i].cat === 'Ферментированные') fermentedCount++;
  }
  var prebLevel = prebScore < 30 ? 'Низкий' : prebScore < 60 ? 'Средний' : prebScore < 90 ? 'Хороший' : 'Отличный';
  var prebColor = prebScore < 30 ? '#c62828' : prebScore < 60 ? '#f57f17' : prebScore < 90 ? '#2d7a3a' : '#0277bd';

  // 3. Радуга
  var colorHits = [];
  for (var i = 0; i < RAINBOW.length; i++) {
    var hit = false;
    for (var j = 0; j < u.length; j++) {
      var n = u[j].name.toLowerCase();
      for (var k = 0; k < RAINBOW[i].words.length; k++) {
        if (n.indexOf(RAINBOW[i].words[k]) >= 0) { hit = true; break; }
      }
      if (hit) break;
    }
    colorHits.push(hit);
  }
  var totalColors = colorHits.filter(Boolean).length;

  // 4. Динамика
  var weekCounts = [];
  for (var i = 5; i >= 0; i--) {
    var wlog = loadWeek(mondayMinus(i));
    weekCounts.push({ count: uniq(wlog).length, cur: i === 0 });
  }
  var maxWC = Math.max.apply(null, weekCounts.map(function(w){ return w.count; })) || 1;

  // 5. Самочувствие — мини-график по дням
  var wellnessDays = loadWeekWellness();
  var filledDays = wellnessDays.filter(function(d){ return d.data && d.data.energy > 0; });
  var avgEnergy = filledDays.length > 0
    ? Math.round(filledDays.reduce(function(s,d){ return s+d.data.energy; },0) / filledDays.length * 10) / 10 : 0;
  var wellnessExtra = '<div style="display:flex;align-items:flex-end;gap:3px;height:28px;margin-top:6px">';
  wellnessDays.forEach(function(d) {
    var e = d.data ? d.data.energy : 0;
    var h = e > 0 ? Math.max(3, Math.round(e/5*24)) : 2;
    wellnessExtra += '<div style="flex:1;border-radius:2px 2px 0 0;height:'+h+'px;background:'+(d.isToday?'#5c6bc0':(e>0?'#c5c8f6':'#eee'))+'"></div>';
  });
  wellnessExtra += '</div>';

  // 6. Сравнение с прошлой неделей
  var prevLog = loadWeek(mondayMinus(1));
  var prevU = uniq(prevLog);
  var prevCount = prevU.length;
  var diffCount = u.length - prevCount;
  var prevWellness = [];
  var prevMon = mondayMinus(1);
  for (var i = 0; i < 7; i++) {
    var pd = new Date(prevMon.getTime()); pd.setDate(prevMon.getDate()+i);
    var pw = loadWellness(localDateStr(pd));
    if (pw && pw.energy > 0) prevWellness.push(pw.energy);
  }
  var prevAvgEnergy = prevWellness.length > 0
    ? Math.round(prevWellness.reduce(function(s,v){ return s+v; },0) / prevWellness.length * 10) / 10 : 0;
  var diffEnergy = avgEnergy > 0 && prevAvgEnergy > 0
    ? Math.round((avgEnergy - prevAvgEnergy) * 10) / 10 : null;
  var compExtra = '<div style="margin-top:8px">'
    + '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">'
    + '<span style="font-size:11px;color:#aaa">Продукты</span>'
    + '<span style="font-size:12px;font-weight:600;color:'+(diffCount>0?'#2d7a3a':diffCount<0?'#c62828':'#aaa')+'">'
    + (diffCount>0?'+':'')+diffCount+(prevCount>0?' (было '+prevCount+')':' нет данных')+'</span></div>'
    + '<div style="display:flex;justify-content:space-between;align-items:center">'
    + '<span style="font-size:11px;color:#aaa">Энергия</span>'
    + '<span style="font-size:12px;font-weight:600;color:'+(diffEnergy!==null?(diffEnergy>0?'#2d7a3a':diffEnergy<0?'#c62828':'#aaa'):'#aaa')+'">'
    + (diffEnergy!==null?(diffEnergy>0?'+':'')+diffEnergy:'нет данных')+'</span></div></div>';

  var cards = [
    // Клетчатка
    { id: 'dash-fiber', bg: '#fff8f2', accent: '#e65100',
      label: 'Клетчатка', value: todayFiber + ' г', sub: 'сегодня',
      extra: '', onclick: 'showDetailFiber()' },
    // Микробиом
    { id: 'dash-micro', bg: '#f0fff4', accent: prebColor,
      label: 'Микробиом', value: prebScore, sub: prebLevel,
      extra: '<div class="dash-bar"><div class="dash-bar-fill" style="width:'+Math.min(100,Math.round(prebScore/90*100))+'%;background:'+prebColor+'"></div></div>',
      onclick: 'showDetailMicrobiome()' },
    // Радуга
    { id: 'dash-rainbow', bg: '#fffef0', accent: '#f57f17',
      label: 'Радуга', value: totalColors + '/8', sub: 'цветов',
      extra: '<div class="dash-rainbow">' + RAINBOW.map(function(r, i){ return '<div class="dash-rainbow-dot" style="background:' + r.hex + ';opacity:' + (colorHits[i]?'1':'0.15') + '"></div>'; }).join('') + '</div>',
      onclick: 'showDetailRainbow()' },
    // Динамика
    { id: 'dash-dyn', bg: '#f0f9f2', accent: '#4caf6e',
      label: 'Динамика', value: weekCounts[5].count, sub: 'эта неделя',
      extra: '<div class="dash-mini-chart">' + weekCounts.map(function(w){ var h = w.count > 0 ? Math.max(3, Math.round(w.count/maxWC*28)) : 2; return '<div class="dash-mini-bar' + (w.cur?' cur':'') + '" style="height:'+h+'px"></div>'; }).join('') + '</div>',
      onclick: 'showDetailDynamics()' },
    // Самочувствие
    { id: 'dash-well', bg: '#f5f0ff', accent: '#5c6bc0',
      label: 'Самочувствие', value: avgEnergy > 0 ? avgEnergy + '/5' : '—', sub: filledDays.length > 0 ? 'ср. энергия · ' + filledDays.length + ' дн.' : 'не заполнено',
      extra: wellnessExtra,
      onclick: 'showDetailWellness()' },
    // Сравнение
    { id: 'dash-compare', bg: '#f0f4ff', accent: '#3949ab',
      label: 'Vs прошлая неделя', value: diffCount > 0 ? '+'+diffCount : diffCount === 0 ? '=' : String(diffCount), sub: 'продуктов',
      extra: compExtra,
      onclick: 'showDetailCompare()' }
  ];

  grid.innerHTML = '';
  cards.forEach(function(c) {
    var el = document.createElement('div');
    el.className = 'dash-card';
    el.style.background = c.bg;
    el.id = c.id;
    el.innerHTML = '<div class="dash-arrow">›</div>'
      + '<div><div class="dash-label">' + c.label + '</div>'
      + '<div class="dash-value" style="color:' + c.accent + '">' + c.value + '</div>'
      + '<div class="dash-sub">' + c.sub + '</div></div>'
      + (c.extra ? c.extra : '');
    el.onclick = new Function(c.onclick);
    grid.appendChild(el);
  });
}

function makeDetailSheet(title, renderFn, infoFn, infoBtnText) {
  var existing = document.querySelector('.sheet-overlay');
  if (existing) existing.remove();
  var el = document.createElement('div'); el.className = 'sheet-overlay';
  var inner = document.createElement('div'); inner.className = 'sheet-inner';
  inner.innerHTML = '<div class="sheet-handle"></div>'
    + '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">'
    + '<div style="font-size:17px;font-weight:600">' + title + '</div>'
    + '<button id="detail-close-btn" style="background:none;border:none;font-size:24px;color:#bbb;cursor:pointer;min-width:44px;min-height:44px;display:flex;align-items:center;justify-content:center">×</button></div>'
    + '<div id="detail-content"></div>';
  if (infoFn) {
    var btn = document.createElement('button');
    btn.className = 'sheet-btn-secondary'; btn.style.marginTop = '12px';
    btn.textContent = infoBtnText;
    btn.onclick = infoFn;
    inner.appendChild(btn);
  }
  el.appendChild(inner);
  document.body.appendChild(el);
  inner.querySelector('#detail-close-btn').onclick = function(){ el.remove(); };
  el.addEventListener('click', function(e){ if(e.target===el) el.remove(); });
  renderFn(document.getElementById('detail-content'));
}

function showDetailFiber() {
  var log = loadWeek(currentMonday());
  makeDetailSheet('Клетчатка', function(container) {
    var today = todayStr(), todayFiber = 0;
    var dayMap = {}, mon = currentMonday();
    for (var i = 0; i < 7; i++) {
      var d = new Date(mon.getTime()); d.setDate(mon.getDate()+i);
      dayMap[localDateStr(d)] = {label: DAY_NAMES[d.getDay()], fiber: 0};
    }
    for (var i = 0; i < log.length; i++) {
      var e = log[i];
      if (e.fiber != null) {
        if (e.isoDate === today) todayFiber += e.fiber;
        if (dayMap[e.isoDate]) dayMap[e.isoDate].fiber += e.fiber;
      }
    }
    todayFiber = Math.round(todayFiber * 10) / 10;
    var days = [];
    for (var k in dayMap) days.push({key:k, label:dayMap[k].label, fiber: Math.round(dayMap[k].fiber*10)/10, isToday: k===today});
    days.sort(function(a,b){ return a.key < b.key ? -1 : 1; });
    var maxF = 0; for (var i = 0; i < days.length; i++) if (days[i].fiber > maxF) maxF = days[i].fiber;
    if (maxF === 0) maxF = 30;
    var html = '<div style="display:flex;align-items:flex-end;gap:10px;margin-bottom:14px">'
      + '<div class="fiber-big">' + todayFiber + '</div>'
      + '<div><div class="fiber-unit">г сегодня</div></div></div>'
      + '<div class="dyn-chart">';
    for (var i = 0; i < days.length; i++) {
      var dw = days[i], h = dw.fiber > 0 ? Math.max(4, Math.round(dw.fiber/maxF*60)) : 2;
      html += '<div class="dyn-col"><div class="dyn-num" style="color:'+(dw.fiber>0?'#e65100':'#ddd')+'">'+(dw.fiber>0?dw.fiber:'—')+'</div>'
        + '<div class="dyn-bar fiber'+(dw.isToday?' cur':'')+'" style="height:'+h+'px"></div>'
        + '<div class="dyn-lbl">'+dw.label+'</div></div>';
    }
    html += '</div>';
    container.innerHTML = html;
  }, showInfoFiber, 'Что такое клетчатка?');
}

function showDetailMicrobiome() {
  var log = loadWeek(currentMonday());
  makeDetailSheet('Микробиом', function(container) {
    var u = uniq(log);
    var weekScore = 0, fermented = [];
    for (var i = 0; i < u.length; i++) {
      weekScore += getPrebioticScore(u[i].name);
      if (u[i].cat === 'Ферментированные') fermented.push(u[i].name);
    }
    var WEEK_GOAL = 90;
    var pct = Math.min(100, Math.round(weekScore / WEEK_GOAL * 100));
    var level, levelColor, levelBg;
    if (weekScore < 30) { level='Низкий'; levelColor='#c62828'; levelBg='#ffebee'; }
    else if (weekScore < 60) { level='Средний'; levelColor='#f57f17'; levelBg='#fff8e1'; }
    else if (weekScore < 90) { level='Хороший'; levelColor='#2d7a3a'; levelBg='#e8f5ee'; }
    else { level='Отличный'; levelColor='#0277bd'; levelBg='#e3f2fd'; }
    var html = '<div style="display:flex;align-items:flex-end;gap:10px;margin-bottom:6px">'
      + '<div style="font-size:38px;font-weight:700;color:'+levelColor+';line-height:1">'+weekScore+'</div>'
      + '<div><div style="font-size:15px;color:#aaa">пребиотических баллов</div>'
      + '<div style="display:inline-block;margin-top:4px;padding:2px 10px;border-radius:99px;background:'+levelBg+';color:'+levelColor+';font-size:12px;font-weight:600">'+level+'</div></div></div>'
      + '<div style="background:#f0f0ee;border-radius:99px;height:8px;overflow:hidden;margin-bottom:4px">'
      + '<div style="height:100%;background:'+levelColor+';border-radius:99px;width:'+pct+'%;transition:width 0.4s"></div></div>'
      + '<div style="font-size:11px;color:#bbb;margin-bottom:14px">цель — '+WEEK_GOAL+' баллов в неделю</div>';
    if (fermented.length > 0) {
      html += '<div style="display:flex;align-items:center;gap:8px;padding:10px 12px;background:#e3f2fd;border-radius:10px;margin-bottom:8px">'
        + '<span style="font-size:18px">🫙</span><div><div style="font-size:12px;font-weight:600;color:#0277bd">Ферментированные: '+fermented.length+'</div>'
        + '<div style="font-size:11px;color:#0277bd;opacity:0.8">'+fermented.join(', ')+'</div></div></div>';
    } else {
      html += '<div style="display:flex;align-items:center;gap:8px;padding:10px 12px;background:#f7f7f5;border-radius:10px;margin-bottom:8px">'
        + '<span style="font-size:18px">🫙</span><div style="font-size:12px;color:#bbb">Ферментированных продуктов пока нет</div></div>';
    }
    var eaten = {}; for (var i=0;i<u.length;i++) eaten[u[i].name.toLowerCase()]=true;
    var suggest=[], suggestions=['Топинамбур','Лук','Чеснок','Семена льна','Овёс','Спаржа','Артишок','Лук-порей','Маш','Чечевица'];
    for (var i=0;i<suggestions.length&&suggest.length<3;i++) if (!eaten[suggestions[i].toLowerCase()]) suggest.push(suggestions[i]);
    if (suggest.length>0) html += '<div style="font-size:11px;color:#aaa;margin-top:4px">Добавь для роста баллов: '+suggest.map(function(s){ return '<span style="background:#f0f0ee;padding:2px 7px;border-radius:99px;margin-right:4px;color:#555">'+s+'</span>'; }).join('')+'</div>';
    container.innerHTML = html;
  }, showPrebioticInfo, 'Что такое пребиотический индекс?');
}

function showDetailRainbow() {
  var log = loadWeek(currentMonday());
  makeDetailSheet('Радуга в тарелке', function(container) {
    var u = uniq(log), counts = [];
    for (var i=0;i<RAINBOW.length;i++) counts.push(0);
    for (var i=0;i<u.length;i++) { var ci=detectColor(u[i].name); if(ci>=0) counts[ci]++; }
    var colored=0; for(var i=0;i<counts.length;i++) colored+=counts[i];
    var colorsHit=0; for(var i=0;i<counts.length;i++) if(counts[i]>0) colorsHit++;
    var html='<div style="font-size:13px;color:#555;margin-bottom:4px">'+colorsHit+' из '+RAINBOW.length+' цветов</div>'
      +'<div class="rainbow-bar-wrap">';
    if(colored===0) html+='<div style="width:100%;background:#f0f0ee"></div>';
    else for(var i=0;i<RAINBOW.length;i++){ if(!counts[i]) continue; html+='<div class="rainbow-seg" style="width:'+Math.round(counts[i]/colored*100)+'%;background:'+RAINBOW[i].hex+'"></div>'; }
    html+='</div><div class="rainbow-legend">';
    for(var i=0;i<RAINBOW.length;i++) html+='<div class="rleg'+(counts[i]>0?'':' off')+'"><div class="rleg-dot" style="background:'+RAINBOW[i].hex+'"></div>'+RAINBOW[i].name+(counts[i]>0?' ('+counts[i]+')':'')+'</div>';
    html+='</div>';
    container.innerHTML = html;
  }, showInfoRainbow, 'Что означают цвета?');
}

function showDetailDynamics() {
  var existing = document.querySelector('.sheet-overlay'); if (existing) existing.remove();
  var el = document.createElement('div'); el.className = 'sheet-overlay';
  var inner = document.createElement('div'); inner.className = 'sheet-inner';
  var metrics = [
    { key: 'products', label: 'Продукты', color: '#4caf6e' },
    { key: 'fiber',    label: 'Клетчатка', color: '#e65100' },
    { key: 'prebiotic',label: 'Микробиом', color: '#2d7a3a' },
    { key: 'energy',   label: 'Энергия',   color: '#5c6bc0' }
  ];
  var activeMetric = 0;

  function getWeekData(metric) {
    var result = [];
    for (var i = 5; i >= 0; i--) {
      var mon = mondayMinus(i);
      var log = loadWeek(mon);
      var u = uniq(log);
      var val = 0;
      if (metric === 'products') {
        val = u.length;
      } else if (metric === 'fiber') {
        for (var j = 0; j < log.length; j++) if (log[j].fiber) val += log[j].fiber;
        val = Math.round(val * 10) / 10;
      } else if (metric === 'prebiotic') {
        for (var j = 0; j < u.length; j++) val += getPrebioticScore(u[j].name);
      } else if (metric === 'energy') {
        var energyVals = [];
        for (var d = 0; d < 7; d++) {
          var dd = new Date(mon.getTime()); dd.setDate(mon.getDate()+d);
          var w = loadWellness(localDateStr(dd));
          if (w && w.energy > 0) energyVals.push(w.energy);
        }
        val = energyVals.length > 0 ? Math.round(energyVals.reduce(function(s,v){return s+v;},0)/energyVals.length*10)/10 : 0;
      }
      result.push({ val: val, lbl: fmtShort(mon), cur: i === 0 });
    }
    return result;
  }

  function renderChart() {
    var m = metrics[activeMetric];
    var data = getWeekData(m.key);
    var max = Math.max.apply(null, data.map(function(d){ return d.val; })) || 1;
    var html = '<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px">';
    metrics.forEach(function(mt, idx) {
      html += '<button onclick="setMetric('+idx+')" style="padding:6px 12px;border-radius:99px;border:1px solid '+(idx===activeMetric?m.color:'#e0e0e0')+';background:'+(idx===activeMetric?m.color:'#f7f7f5')+';color:'+(idx===activeMetric?'#fff':'#555')+';font-size:12px;cursor:pointer;font-weight:'+(idx===activeMetric?'600':'400')+'">'+mt.label+'</button>';
    });
    html += '</div><div class="dyn-chart">';
    data.forEach(function(d) {
      var h = d.val > 0 ? Math.max(4, Math.round(d.val/max*60)) : 2;
      html += '<div class="dyn-col">'
        + '<div class="dyn-num" style="color:'+(d.val>0?m.color:'#ddd')+'">'+(d.val>0?d.val:'—')+'</div>'
        + '<div style="width:100%;border-radius:4px 4px 0 0;height:'+h+'px;background:'+(d.cur?m.color:'#e0e0e0')+'"></div>'
        + '<div class="dyn-lbl">'+d.lbl+'</div></div>';
    });
    html += '</div>';
    document.getElementById('dyn-chart-content').innerHTML = html;
  }

  inner.innerHTML = '<div class="sheet-handle"></div>'
    + '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">'
    + '<div style="font-size:17px;font-weight:600">Динамика</div>'
    + '<button id="dyn-close" style="background:none;border:none;font-size:24px;color:#bbb;cursor:pointer;min-width:44px;min-height:44px;display:flex;align-items:center;justify-content:center">×</button></div>'
    + '<div id="dyn-chart-content"></div>';
  el.appendChild(inner);
  document.body.appendChild(el);
  inner.querySelector('#dyn-close').onclick = function(){ el.remove(); };
  el.addEventListener('click', function(e){ if(e.target===el) el.remove(); });

  window.setMetric = function(idx) { activeMetric = idx; renderChart(); };
  renderChart();
}

function showDetailCompare() {
  makeDetailSheet('Сравнение недель', function(container) {
    var thisLog = loadWeek(currentMonday());
    var prevLog = loadWeek(mondayMinus(1));
    var thisU = uniq(thisLog), prevU = uniq(prevLog);

    // Энергия
    function avgEnergyForWeek(mon) {
      var vals = [];
      for (var i = 0; i < 7; i++) {
        var d = new Date(mon.getTime()); d.setDate(mon.getDate()+i);
        var w = loadWellness(localDateStr(d));
        if (w && w.energy > 0) vals.push(w.energy);
      }
      return vals.length > 0 ? Math.round(vals.reduce(function(s,v){return s+v;},0)/vals.length*10)/10 : null;
    }
    var thisEnergy = avgEnergyForWeek(currentMonday());
    var prevEnergy = avgEnergyForWeek(mondayMinus(1));

    function row(label, thisVal, prevVal, unit, goodDir) {
      var diff = (thisVal !== null && prevVal !== null) ? Math.round((thisVal - prevVal) * 10) / 10 : null;
      var diffColor = diff === null ? '#bbb' : (diff === 0 ? '#aaa' : ((goodDir === 1 ? diff > 0 : diff < 0) ? '#2d7a3a' : '#c62828'));
      var diffStr = diff === null ? 'нет данных' : (diff > 0 ? '+' : '') + diff + (unit||'');
      return '<div style="display:flex;align-items:center;padding:12px 0;border-bottom:0.5px solid #f0f0ee">'
        + '<div style="flex:1;font-size:14px;font-weight:500">'+label+'</div>'
        + '<div style="text-align:right">'
        + '<div style="font-size:13px;color:#aaa">'+(prevVal!==null?prevVal+(unit||''):'-')+' → <span style="color:#1a1a1a;font-weight:600">'+(thisVal!==null?thisVal+(unit||''):'-')+'</span></div>'
        + '<div style="font-size:12px;font-weight:600;color:'+diffColor+'">'+diffStr+'</div>'
        + '</div></div>';
    }

    var html = row('Продукты', thisU.length, prevU.length, '', 1);
    html += row('Энергия', thisEnergy, prevEnergy, '/5', 1);
    container.innerHTML = html || '<div style="font-size:13px;color:#bbb;text-align:center;padding:20px 0">Нет данных за прошлую неделю</div>';
  }, null, null);
}

function showDetailCats() {
  var log = loadWeek(currentMonday());
  var u = uniq(log);
  var catCounts = {};
  CATS.forEach(function(c){ catCounts[c.name] = 0; });
  u.forEach(function(e){ if (e.cat && catCounts[e.cat]!==undefined) catCounts[e.cat]++; });
  var el = document.createElement('div'); el.className = 'sheet-overlay';
  var inner = document.createElement('div'); inner.className = 'sheet-inner';
  var html = '<div class="sheet-handle"></div>'
    + '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">'
    + '<div style="font-size:17px;font-weight:600">По категориям</div>'
    + '<button onclick="this.closest(\'.sheet-overlay\').remove()" style="background:none;border:none;font-size:24px;color:#bbb;cursor:pointer;min-width:44px;min-height:44px;display:flex;align-items:center;justify-content:center">×</button></div>';
  CATS.forEach(function(cat) {
    var cnt = catCounts[cat.name] || 0;
    var pct = Math.min(100, Math.round(cnt / (cat.items.length) * 100));
    html += '<div style="margin-bottom:14px">'
      + '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:5px">'
      + '<div style="display:flex;align-items:center;gap:6px"><span style="font-size:16px">'+cat.icon+'</span><span style="font-size:14px;font-weight:500">'+cat.name+'</span></div>'
      + '<span style="font-size:13px;font-weight:600;color:'+cat.color+'">'+cnt+'</span></div>'
      + '<div style="background:#eee;border-radius:99px;height:5px;overflow:hidden">'
      + '<div style="height:100%;border-radius:99px;background:'+cat.color+';width:'+pct+'%"></div></div></div>';
  });
  inner.innerHTML = html;
  el.appendChild(inner);
  document.body.appendChild(el);
  el.addEventListener('click', function(e){ if(e.target===el) el.remove(); });
}

function showDetailWellness() {
  makeDetailSheet('Самочувствие', function(container) {
    var days = loadWeekWellness();
    var hasAny = days.some(function(d){ return d.data; });
    if (!hasAny) {
      container.innerHTML = '<div style="font-size:13px;color:#ccc;text-align:center;padding:20px 0">Нажми «Самочувствие» чтобы начать заполнять</div>';
      return;
    }
    var bloatLabels = ['нет','лёгкое','сильное'];
    var bristolLabels = ['','твёрдый','норма','мягкий','жидкий'];
    // Энергия по дням
    var maxE = 5;
    var html = '<div style="font-size:11px;color:#aaa;margin-bottom:6px;text-transform:uppercase;letter-spacing:0.04em;font-weight:600">Энергия</div>'
      + '<div class="dyn-chart" style="margin-bottom:16px">';
    days.forEach(function(d) {
      var e = d.data ? d.data.energy : 0;
      var h = e > 0 ? Math.max(4, Math.round(e/maxE*60)) : 2;
      html += '<div class="dyn-col"><div class="dyn-num" style="color:'+(e>0?'#5c6bc0':'#ddd')+'">'+(e>0?e:'—')+'</div>'
        + '<div style="width:100%;border-radius:4px 4px 0 0;height:'+h+'px;background:'+(d.isToday?'#5c6bc0':'#c5c8f6')+'"></div>'
        + '<div class="dyn-lbl">'+d.label+'</div></div>';
    });
    html += '</div>';
    // Вздутие
    html += '<div style="font-size:11px;color:#aaa;margin-bottom:6px;text-transform:uppercase;letter-spacing:0.04em;font-weight:600">Вздутие</div>'
      + '<div style="display:flex;gap:5px;margin-bottom:16px">';
    days.forEach(function(d) {
      var bv = d.data ? d.data.bloating : -1;
      var bg = bv >= 0 ? ['#e8f5ee','#fff8e1','#ffebee'][bv] : '#f7f7f5';
      var tc = bv >= 0 ? ['#2d7a3a','#f57f17','#c62828'][bv] : '#ddd';
      html += '<div style="flex:1;border-radius:8px;background:'+bg+';padding:5px 2px;text-align:center">'
        + '<div style="font-size:9px;color:'+tc+';font-weight:600;line-height:1.3">'+(bv>=0?bloatLabels[bv]:'—')+'</div>'
        + '<div style="font-size:9px;color:#bbb">'+d.label+'</div></div>';
    });
    html += '</div>';
    // Подробно по дням
    var filledDays = days.filter(function(d){ return d.data; });
    if (filledDays.length > 0) {
      html += '<div style="font-size:11px;color:#aaa;margin-bottom:10px;text-transform:uppercase;letter-spacing:0.04em;font-weight:600">Детально</div>';
      filledDays.forEach(function(d) {
        var w = d.data;
        html += '<div style="padding:10px 12px;background:#f7f7f5;border-radius:10px;margin-bottom:8px;font-size:13px">'
          + '<div style="font-weight:600;margin-bottom:4px">'+['Вс','Пн','Вт','Ср','Чт','Пт','Сб'][new Date(d.iso).getDay()]+' · энергия '+w.energy+'/5</div>'
          + '<div style="color:#888">Вздутие: '+bloatLabels[w.bloating||0]+(w.bloatingTime&&w.bloatingTime.length>0?' ('+w.bloatingTime.join(', ')+')'  : '')+'</div>'
          + (w.bristol>0?'<div style="color:#888">Стул: '+bristolLabels[w.bristol]+'</div>':'')
          + '</div>';
      });
    }
    container.innerHTML = html;
  }, null, null);
}

function render() {
  var log = loadWeek(currentMonday());
  renderMain(log);
  renderDashboard(log);
  renderChips();
  renderFreq(log);
}

function addItem(name, cat, grams, cooked) {
  var n = name.trim(); if (!n) return;
  var resolvedCat = cat || detectCat(n);
  var fiberVal = grams ? calcFiber(n, grams, cooked) : null;
  var log = loadWeek(currentMonday());
  var today = new Date().toLocaleDateString('ru', {day:'numeric', month:'short'});
  log.push({name:n, cat:resolvedCat, date:today, isoDate:todayStr(), grams:grams||null, cooked:!!cooked, fiber:fiberVal});
  saveWeek(log); render();
}

function deleteItem(idx) {
  var log = loadWeek(currentMonday());
  if (idx>=0 && idx<log.length) { log.splice(idx,1); saveWeek(log); render(); }
}

document.getElementById('addBtn').addEventListener('click', function() {
  var n = document.getElementById('inp').value.trim(); if (!n) return;
  var g = parseInt(document.getElementById('grams').value) || null;
  addItem(n, null, g, false);
  document.getElementById('inp').value = ''; document.getElementById('grams').value = '';
});
document.getElementById('inp').addEventListener('keydown', function(e) {
  if (e.key==='Enter') { var n=this.value.trim(); if(!n) return; var g=parseInt(document.getElementById('grams').value)||null; addItem(n,null,g,false); this.value=''; document.getElementById('grams').value=''; }
});
document.getElementById('wellnessBtn').addEventListener('click', showWellnessPopup);
document.getElementById('shopBtn').addEventListener('click', showShoppingList);
document.getElementById('resetBtn').addEventListener('click', function() {
  if (confirm('Сбросить все продукты этой недели?')) { localStorage.removeItem(storageKey(currentMonday())); render(); }
});

initApp();
</script>
